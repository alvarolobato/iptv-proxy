# Build and push Docker image iptv-proxy2 to Docker Hub when a release is created.
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
name: Release Docker Image

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run unit tests
        run: go test -mod=vendor -v -race ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: web/frontend

      - name: Build frontend
        run: npm run build
        working-directory: web/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web/frontend

      - name: Run e2e tests
        run: npm run e2e
        working-directory: web/frontend
        env:
          CI: true

  docker:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/iptv-proxy2:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/iptv-proxy2:latest
