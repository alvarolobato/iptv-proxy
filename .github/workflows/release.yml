# Build and attach binaries to a GitHub release when the release is published.
# See docs/release.md for how to create a release.
name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
          - goos: windows
            goarch: arm64
            suffix: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -mod=vendor -ldflags="-s -w" -o iptv-proxy${{ matrix.suffix }} .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip iptv-proxy_${{ matrix.goos }}_${{ matrix.goarch }}.zip iptv-proxy${{ matrix.suffix }}
          else
            tar czvf iptv-proxy_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz iptv-proxy${{ matrix.suffix }}
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: iptv-proxy_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
