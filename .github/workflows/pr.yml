# Build and test on every pull request.
name: PR Build and Test

on:
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        run: go test -mod=vendor -v -race ./...

      - name: Build
        run: go build -mod=vendor -v .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build . --file Dockerfile --tag iptv-proxy2:pr-build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: web/frontend

      - name: Build frontend
        run: npm run build
        working-directory: web/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web/frontend

      - name: Run e2e tests
        run: npm run e2e
        working-directory: web/frontend
        env:
          CI: true
