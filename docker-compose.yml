version: "3"
services:
  iptv-proxy2:
    image: alobato/iptv-proxy2:latest
    container_name: iptv-proxy2
    restart: on-failure
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    environment:
      M3U_URL: "http://example.com/get.php?username=USER&password=PASS&type=m3u_plus&output=m3u8"
      PORT: 8080
      HOSTNAME: localhost
      USER: myuser
      PASSWORD: mypass
      JSON_FOLDER: /data
