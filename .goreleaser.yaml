# Builds binaries for GitHub release. Docker image is built and pushed by .github/workflows/release-docker.yml (alobato/iptv-proxy2).
project_name: iptv-proxy2

builds:
  - id: default
    binary: iptv-proxy2
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor
      - -a
    ldflags:
      - -s -w -X 'github.com/alvarolobato/iptv-proxy/cmd.BuildDate={{.Date}}'
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format_overrides:
      - goos: windows
        format: zip

release:
  github:
    owner: alvarolobato
    name: iptv-proxy
  draft: false

nfpms:
  - vendor: iptv-proxy2
    homepage: https://github.com/alvarolobato/iptv-proxy
    description: Reverse proxy for IPTV M3U and Xtream Codes API
    license: GPL-3.0
    formats:
      - deb
      - rpm
