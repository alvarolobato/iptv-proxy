    <title>IPTV-Proxy configuration</title>
    <style>
      /* Row status colors for Groups/Channels tables (EUI basic table row classes) */
      .euiTableRow--included { background-color: #e8f5e9 !important; }
      .euiTableRow--excluded { background-color: #ffebee !important; }
      .euiTableRow--included:hover { background-color: #c8e6c9 !important; }
      .euiTableRow--excluded:hover { background-color: #ffcdd2 !important; }
      /* Filter buttons: no underline, clear selected state */
      .euiFilterGroup .euiFilterButton { text-decoration: none !important; }
      .euiFilterGroup .euiFilterButton:hover { text-decoration: none !important; }
      .euiFilterGroup .euiFilterButton.euiFilterButton-isSelected {
        background-color: #017d73 !important;
        color: #fff !important;
        text-decoration: none !important;
      }
    </style>
